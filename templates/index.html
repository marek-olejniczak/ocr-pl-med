<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Annotation Tool</title>
<style>
:root {
  --bg-primary: #0f0f0f;
  --bg-secondary: #181818;
  --bg-tertiary: #222222;
  --bg-hover: #2a2a2a;
  --bg-active: #333333;
  --border: #2e2e2e;
  --border-light: #3a3a3a;
  --text-primary: #f0f0f0;
  --text-secondary: #999;
  --text-muted: #666;
  --accent: #6c5ce7;
  --accent-hover: #7d6ff0;
  --accent-glow: rgba(108, 92, 231, 0.15);
  --danger: #e74c3c;
  --danger-hover: #c0392b;
  --success: #2ecc71;
  --warning: #f39c12;
  --radius: 8px;
  --radius-sm: 5px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --transition: 0.15s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ──────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.header .logo {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--accent);
  margin-right: 8px;
  white-space: nowrap;
}
.header .logo span { color: var(--text-muted); font-weight: 400; }

.btn-group {
  display: flex;
  gap: 2px;
  background: var(--bg-tertiary);
  border-radius: var(--radius);
  padding: 2px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-secondary);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn:active { background: var(--bg-active); }
.btn-accent {
  background: var(--accent);
  color: #fff;
}
.btn-accent:hover { background: var(--accent-hover); color: #fff; }

.btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.header .spacer { flex: 1; }

/* Hidden file inputs */
.hidden-input { display: none; }

/* ── Main layout ─────────────────────────── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Thumbnail strip (left) ──────────────── */
.thumb-strip {
  width: 72px;
  min-width: 72px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.thumb-strip::-webkit-scrollbar { width: 4px; }
.thumb-strip::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
.thumb-strip:empty::after {
  content: "No images";
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  padding: 8px 0;
}
.thumb {
  width: 58px;
  height: 44px;
  border-radius: 4px;
  border: 2px solid transparent;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: border-color var(--transition);
  background: var(--bg-tertiary);
}
.thumb:hover { border-color: var(--border-light); }
.thumb.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.thumb .thumb-badge {
  position: absolute;
  bottom: 1px;
  right: 1px;
  background: var(--accent);
  color: #fff;
  font-size: 8px;
  font-weight: 700;
  padding: 1px 3px;
  border-radius: 3px;
  line-height: 1;
}

/* ── Canvas area ─────────────────────────── */
.canvas-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background:
    linear-gradient(45deg, #141414 25%, transparent 25%),
    linear-gradient(-45deg, #141414 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #141414 75%),
    linear-gradient(-45deg, transparent 75%, #141414 75%);
  background-size: 20px 20px;
  background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
  background-color: #111;
  cursor: crosshair;
}
canvas { display: block; }

/* Drop overlay */
.drop-zone {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
  z-index: 20;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.drop-zone.visible {
  opacity: 1;
  pointer-events: auto;
  background: rgba(108, 92, 231, 0.08);
  backdrop-filter: blur(4px);
  border: 2px dashed var(--accent);
}
.drop-zone svg { width: 48px; height: 48px; stroke: var(--accent); fill: none; stroke-width: 1.5; }
.drop-zone p { color: var(--text-secondary); font-size: 14px; }

/* Empty state */
.empty-state {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  pointer-events: none;
}
.empty-state.hidden { display: none; }
.empty-state svg { width: 56px; height: 56px; stroke: var(--text-muted); fill: none; stroke-width: 1; opacity: 0.4; }
.empty-state p { color: var(--text-muted); font-size: 14px; }
.empty-state .hint { font-size: 12px; color: var(--text-muted); opacity: 0.6; }

/* ── Sidebar (right) ─────────────────────── */
.sidebar {
  width: 290px;
  min-width: 240px;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.sidebar-header {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-header h3 {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
}
.sidebar-header .count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--bg-tertiary);
  padding: 2px 7px;
  border-radius: 10px;
}
.ann-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 6px;
}
.ann-list::-webkit-scrollbar { width: 5px; }
.ann-list::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
.ann-item {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  margin: 2px 0;
  gap: 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition);
}
.ann-item:hover { background: var(--bg-hover); }
.ann-item.selected { background: var(--accent-glow); border: 1px solid rgba(108,92,231,0.3); }
.ann-item .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ann-item .info {
  flex: 1;
  min-width: 0;
}
.ann-item .info .name {
  font-size: 13px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.ann-item .info .coords {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 1px;
  font-family: 'Consolas', 'Monaco', monospace;
}
.ann-item .del-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 4px;
  opacity: 0;
  transition: all var(--transition);
}
.ann-item:hover .del-btn { opacity: 1; }
.ann-item .del-btn:hover { background: var(--danger); color: #fff; opacity: 1; }

.sidebar-footer {
  padding: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 6px;
}
.sidebar-footer .btn { flex: 1; justify-content: center; font-size: 12px; padding: 7px 0; }
.btn-danger { color: var(--danger); }
.btn-danger:hover { background: rgba(231,76,60,0.12); color: var(--danger); }

/* ── Status bar ──────────────────────────── */
.status-bar {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 5px 16px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
}
.status-bar .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; }
.status-bar .dot-saved { background: var(--success); }
.status-bar .dot-unsaved { background: var(--warning); }
.status-bar .shortcut { color: var(--text-muted); opacity: 0.5; }
.status-bar .shortcut kbd {
  background: var(--bg-tertiary);
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 10px;
  font-family: inherit;
}

/* ── Toast ────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-tertiary);
  color: var(--text-primary);
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  z-index: 100;
  border: 1px solid var(--border-light);
  box-shadow: var(--shadow);
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--danger); }
.toast.success { border-color: var(--success); }

/* ── Label prompt (floating bar, no overlay) ── */
.label-bar {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 8px 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.label-bar.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateX(-50%) translateY(0);
}
.label-bar .label-hint {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}
.label-bar input {
  padding: 7px 10px;
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px;
  width: 260px;
  outline: none;
  transition: border var(--transition);
}
.label-bar input:focus { border-color: var(--accent); }
.label-bar button {
  padding: 7px 14px;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all var(--transition);
}
.label-bar .btn-confirm {
  background: var(--accent);
  color: #fff;
}
.label-bar .btn-confirm:hover { background: var(--accent-hover); }
.label-bar .btn-cancel {
  background: var(--bg-tertiary);
  color: var(--text-secondary);
}
.label-bar .btn-cancel:hover { background: var(--bg-hover); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">Annotator <span>/ OCR</span></div>

  <div class="btn-group">
    <button class="btn" onclick="document.getElementById('fileInput').click()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Open Images
    </button>
    <button class="btn" onclick="document.getElementById('folderInput').click()">
      <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
      Open Folder
    </button>
    <button class="btn" onclick="document.getElementById('pdfInput').click()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>
      Open PDF
    </button>
  </div>

  <div class="btn-group">
    <button class="btn" onclick="navigateImage(-1)">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="btn" onclick="navigateImage(1)">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="btn-group">
    <button class="btn" onclick="zoomBy(1.3)">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="btn" onclick="zoomBy(0.77)">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>
    <button class="btn" onclick="zoomFit()">Fit</button>
  </div>

  <div class="spacer"></div>

  <button class="btn btn-accent" onclick="saveAnnotations()">
    <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save
  </button>
</div>

<!-- File inputs -->
<input type="file" id="fileInput" class="hidden-input" accept="image/*" multiple>
<input type="file" id="folderInput" class="hidden-input" webkitdirectory>
<input type="file" id="pdfInput" class="hidden-input" accept="application/pdf,.pdf" multiple>

<!-- Main -->
<div class="main">
  <!-- Thumbnail strip -->
  <div class="thumb-strip" id="thumbStrip"></div>

  <!-- Canvas -->
  <div class="canvas-area" id="canvasWrap">
    <canvas id="canvas"></canvas>
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p>Open images, a PDF, or drag &amp; drop to get started</p>
      <span class="hint">Supports JPG, PNG, BMP, TIFF, PDF</span>
    </div>
    <div class="drop-zone" id="dropZone">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p>Drop images here</p>
    </div>
    <div class="label-bar" id="labelBar">
      <span class="label-hint">Label:</span>
      <input type="text" id="modalLabelInput" placeholder="e.g. patient_name, date, address..." spellcheck="false" autocomplete="off">
      <button class="btn-confirm" onclick="confirmLabel()">Add</button>
      <button class="btn-cancel" onclick="cancelLabel()">Cancel</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>Annotations</h3>
      <span class="count" id="annCount">0</span>
    </div>
    <div class="ann-list" id="annList"></div>
    <div class="sidebar-footer">
      <button class="btn" onclick="undoLast()">
        <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 105.64-8.36L1 10"/></svg>
        Undo
      </button>
      <button class="btn btn-danger" onclick="deleteSelected()">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        Delete
      </button>
      <button class="btn" onclick="clearAll()">Clear All</button>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar" id="statusBar">
  <span>Ready</span>
</div>


<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const wrap = document.getElementById("canvasWrap");

let images = [];       // [{id, name, width, height}]
let currentIdx = -1;
let img = null;
let imgW = 0, imgH = 0;

let annotations = [];
let selectedIdx = -1;
let unsaved = false;

// Per-image annotation cache
const annCache = {};   // id -> annotations[]

let zoom = 1, panX = 0, panY = 0;
let drawing = false, drawSX = 0, drawSY = 0, drawCX = 0, drawCY = 0;
let panning = false, panLX = 0, panLY = 0;
let ctrlHeld = false;

// Pending box awaiting label
let pendingBox = null;  // {x_min, y_min, x_max, y_max}

const COLORS = [
  "#6c5ce7","#00cec9","#e17055","#fdcb6e","#a29bfe",
  "#55efc4","#fab1a0","#74b9ff","#ff7675","#81ecec",
];
const var_accent = "#6c5ce7";

// ── File handling ──────────────────────────────────────────────
document.getElementById("fileInput").addEventListener("change", (e) => uploadFiles(e.target.files));
document.getElementById("folderInput").addEventListener("change", (e) => uploadFiles(e.target.files));
document.getElementById("pdfInput").addEventListener("change", (e) => uploadFiles(e.target.files));

// Drag and drop
const dropZone = document.getElementById("dropZone");
let dragCounter = 0;
wrap.addEventListener("dragenter", (e) => { e.preventDefault(); dragCounter++; dropZone.classList.add("visible"); });
wrap.addEventListener("dragleave", (e) => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropZone.classList.remove("visible"); } });
wrap.addEventListener("dragover", (e) => e.preventDefault());
wrap.addEventListener("drop", (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropZone.classList.remove("visible");
  if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
});

async function uploadFiles(fileList) {
  const form = new FormData();
  const validExts = new Set(["jpg","jpeg","png","bmp","tiff","tif","pdf"]);
  let count = 0;
  for (const f of fileList) {
    const ext = f.name.split(".").pop().toLowerCase();
    if (validExts.has(ext)) { form.append("images", f); count++; }
  }
  if (count === 0) { toast("No valid image or PDF files found", "error"); return; }

  const res = await fetch("/api/upload", { method: "POST", body: form });
  const data = await res.json();
  if (!data.ok) { toast(data.error || "Upload failed", "error"); return; }

  images = data.images;
  currentIdx = 0;
  buildThumbs();
  await switchToImage(0);
  toast(`Loaded ${images.length} image${images.length > 1 ? "s" : ""}`, "success");
}

// ── Image switching ────────────────────────────────────────────
async function switchToImage(idx) {
  if (idx < 0 || idx >= images.length) return;

  // Cache current annotations
  if (currentIdx >= 0 && images[currentIdx]) {
    annCache[images[currentIdx].id] = annotations;
  }

  currentIdx = idx;
  const info = images[idx];
  imgW = info.width;
  imgH = info.height;

  await fetch("/api/set-current", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: info.id }),
  });

  // Load image
  const newImg = new window.Image();
  newImg.onload = async () => {
    img = newImg;
    document.getElementById("emptyState").classList.add("hidden");

    // Load annotations from cache or server
    if (annCache[info.id]) {
      annotations = annCache[info.id];
    } else {
      const res = await fetch(`/api/load-annotations/${info.id}`);
      const data = await res.json();
      annotations = data.annotations;
      annCache[info.id] = annotations;
    }
    selectedIdx = -1;
    unsaved = false;
    resizeCanvas();
    zoomFit();
    updateList();
    updateThumbs();
  };
  newImg.src = `/api/image/${info.id}?t=${Date.now()}`;
}

function navigateImage(dir) {
  if (images.length < 2) return;
  const next = (currentIdx + dir + images.length) % images.length;
  switchToImage(next);
}

// ── Thumbnails ─────────────────────────────────────────────────
function buildThumbs() {
  const strip = document.getElementById("thumbStrip");
  strip.innerHTML = "";
  images.forEach((info, i) => {
    const div = document.createElement("div");
    div.className = "thumb" + (i === currentIdx ? " active" : "");
    div.dataset.idx = i;
    div.innerHTML = `<img src="/api/image/${info.id}" loading="lazy"><div class="thumb-badge" style="display:none">0</div>`;
    div.addEventListener("click", () => switchToImage(i));
    strip.appendChild(div);
  });
}

function updateThumbs() {
  document.querySelectorAll(".thumb").forEach((el, i) => {
    el.classList.toggle("active", i === currentIdx);
    const badge = el.querySelector(".thumb-badge");
    const id = images[i]?.id;
    const count = (annCache[id] || []).length;
    badge.textContent = count;
    badge.style.display = count > 0 ? "" : "none";
  });
}

// ── Canvas ─────────────────────────────────────────────────────
function resizeCanvas() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  render();
}
window.addEventListener("resize", resizeCanvas);

function screenToImg(sx, sy) { return [(sx - panX) / zoom, (sy - panY) / zoom]; }
function imgToScreen(ix, iy) { return [ix * zoom + panX, iy * zoom + panY]; }

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!img) return;

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);
  ctx.imageSmoothingEnabled = zoom < 1;
  ctx.drawImage(img, 0, 0);

  // Annotations
  annotations.forEach((ann, i) => {
    const color = COLORS[i % COLORS.length];
    const w = ann.x_max - ann.x_min, h = ann.y_max - ann.y_min;
    // Fixed screen-space sizes so labels stay readable at any zoom
    const lw = (i === selectedIdx ? 3 : 2) / zoom;

    // Fill — visible tint so you can see what's covered
    ctx.fillStyle = color + (i === selectedIdx ? "55" : "40");
    ctx.fillRect(ann.x_min, ann.y_min, w, h);

    // Border
    ctx.strokeStyle = color;
    ctx.lineWidth = lw;
    ctx.strokeRect(ann.x_min, ann.y_min, w, h);

    // Label tag — fixed 14px on screen regardless of zoom
    const fs = 14 / zoom;
    ctx.font = `700 ${fs}px 'Segoe UI', sans-serif`;
    const tw = ctx.measureText(ann.label).width;
    const padX = 6 / zoom;
    const padY = 4 / zoom;
    const tagH = fs + padY * 2;
    const tagY = ann.y_min - tagH;

    // Tag background with slight shadow
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    roundRect(ctx, ann.x_min + 1/zoom, tagY + 1/zoom, tw + padX * 2, tagH, 4 / zoom);
    ctx.fill();
    ctx.fillStyle = color;
    roundRect(ctx, ann.x_min, tagY, tw + padX * 2, tagH, 4 / zoom);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.fillText(ann.label, ann.x_min + padX, ann.y_min - padY);
  });

  // Active drawing
  if (drawing) {
    ctx.strokeStyle = "#00e5ff";
    ctx.lineWidth = 2 / zoom;
    ctx.setLineDash([6 / zoom, 3 / zoom]);
    ctx.fillStyle = "rgba(0,229,255,0.15)";
    const x = Math.min(drawSX, drawCX), y = Math.min(drawSY, drawCY);
    const w = Math.abs(drawCX - drawSX), h = Math.abs(drawCY - drawSY);
    ctx.fillRect(x, y, w, h);
    ctx.strokeRect(x, y, w, h);
    ctx.setLineDash([]);
  }

  // Pending box (drawn, awaiting label)
  if (pendingBox) {
    const pb = pendingBox;
    ctx.strokeStyle = var_accent;
    ctx.lineWidth = 2.5 / zoom;
    ctx.setLineDash([8 / zoom, 4 / zoom]);
    ctx.fillStyle = "rgba(108,92,231,0.12)";
    ctx.fillRect(pb.x_min, pb.y_min, pb.x_max - pb.x_min, pb.y_max - pb.y_min);
    ctx.strokeRect(pb.x_min, pb.y_min, pb.x_max - pb.x_min, pb.y_max - pb.y_min);
    ctx.setLineDash([]);

    // "?" label tag
    const fs = Math.max(10, 12 / zoom);
    ctx.font = `600 ${fs}px 'Segoe UI', sans-serif`;
    const pad = 4 / zoom;
    const tagH = fs + pad * 2;
    ctx.fillStyle = var_accent;
    roundRect(ctx, pb.x_min, pb.y_min - tagH, ctx.measureText("?").width + pad * 3, tagH, 3 / zoom);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.fillText("?", pb.x_min + pad * 1.5, pb.y_min - pad);
  }

  ctx.restore();
  updateStatus();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Ctrl tracking for pan mode ─────────────────────────────────
document.addEventListener("keydown", (e) => {
  if (e.key === "Control") { ctrlHeld = true; canvas.style.cursor = "grab"; }
});
document.addEventListener("keyup", (e) => {
  if (e.key === "Control") { ctrlHeld = false; if (!panning) canvas.style.cursor = "crosshair"; }
});

// ── Mouse ──────────────────────────────────────────────────────
canvas.addEventListener("mousedown", (e) => {
  if (!img) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;

  // Ctrl+any click or middle mouse = pan
  if (e.button === 1 || (e.button === 0 && ctrlHeld)) {
    panning = true; panLX = e.clientX; panLY = e.clientY;
    canvas.style.cursor = "grabbing";
    e.preventDefault(); return;
  }
  // Right-click = delete annotation under cursor
  if (e.button === 2) {
    const [ix, iy] = screenToImg(mx, my);
    for (let i = annotations.length - 1; i >= 0; i--) {
      const a = annotations[i];
      if (ix >= a.x_min && ix <= a.x_max && iy >= a.y_min && iy <= a.y_max) {
        annotations.splice(i, 1);
        selectedIdx = selectedIdx === i ? -1 : selectedIdx > i ? selectedIdx - 1 : selectedIdx;
        unsaved = true; render(); updateList(); return;
      }
    }
    return;
  }
  // Left click = draw box
  if (e.button === 0) {
    const [ix, iy] = screenToImg(mx, my);
    drawing = true; drawSX = ix; drawSY = iy; drawCX = ix; drawCY = iy;
  }
});

canvas.addEventListener("mousemove", (e) => {
  if (panning) {
    panX += e.clientX - panLX; panY += e.clientY - panLY;
    panLX = e.clientX; panLY = e.clientY; render(); return;
  }
  if (drawing) {
    const rect = canvas.getBoundingClientRect();
    [drawCX, drawCY] = screenToImg(e.clientX - rect.left, e.clientY - rect.top);
    render();
  }
});

canvas.addEventListener("mouseup", (e) => {
  if (panning) { panning = false; canvas.style.cursor = ctrlHeld ? "grab" : "crosshair"; return; }
  if (!drawing) return;
  drawing = false;

  let x1 = Math.round(Math.max(0, Math.min(drawSX, drawCX)));
  let y1 = Math.round(Math.max(0, Math.min(drawSY, drawCY)));
  let x2 = Math.round(Math.min(imgW, Math.max(drawSX, drawCX)));
  let y2 = Math.round(Math.min(imgH, Math.max(drawSY, drawCY)));
  if ((x2 - x1) < 4 || (y2 - y1) < 4) { render(); return; }

  // Store the box and show the label prompt
  pendingBox = { x_min: x1, y_min: y1, x_max: x2, y_max: y2 };
  render(); // shows the pending box outline
  showLabelModal();
});

canvas.addEventListener("contextmenu", (e) => e.preventDefault());

canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const old = zoom;
  zoom = Math.min(30, Math.max(0.02, zoom * (e.deltaY < 0 ? 1.12 : 1 / 1.12)));
  panX = mx - (mx - panX) * (zoom / old);
  panY = my - (my - panY) * (zoom / old);
  render();
}, { passive: false });

// ── Label modal ────────────────────────────────────────────────
function showLabelModal() {
  const bar = document.getElementById("labelBar");
  const inp = document.getElementById("modalLabelInput");
  bar.classList.add("visible");
  inp.value = "";
  setTimeout(() => inp.focus(), 50);
}

function confirmLabel() {
  const inp = document.getElementById("modalLabelInput");
  const label = inp.value.trim();
  if (!label) { inp.focus(); return; }

  if (pendingBox) {
    annotations.push({ label, ...pendingBox });
    unsaved = true;
    annCache[images[currentIdx].id] = annotations;
    pendingBox = null;
    render(); updateList(); updateThumbs();
  }
  document.getElementById("labelBar").classList.remove("visible");
}

function cancelLabel() {
  pendingBox = null;
  document.getElementById("labelBar").classList.remove("visible");
  render();
}

// Label bar keyboard: Enter = confirm, Escape = cancel
document.getElementById("modalLabelInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); confirmLabel(); }
  if (e.key === "Escape") { e.preventDefault(); cancelLabel(); }
});

// ── Keyboard ───────────────────────────────────────────────────
document.addEventListener("keydown", (e) => {
  if (e.key === "Control") return;  // handled separately
  // Don't handle shortcuts when modal is open or typing in inputs
  if (document.getElementById("labelBar").classList.contains("visible")) return;
  if (e.target.tagName === "INPUT") return;

  if (e.ctrlKey && e.key === "s") { e.preventDefault(); saveAnnotations(); }
  else if (e.ctrlKey && e.key === "z") { e.preventDefault(); undoLast(); }
  else if (e.key === "Delete") deleteSelected();
  else if (e.key === "ArrowLeft") navigateImage(-1);
  else if (e.key === "ArrowRight") navigateImage(1);
  else if (e.key === "+" || e.key === "=") zoomBy(1.3);
  else if (e.key === "-") zoomBy(0.77);
  else if (e.key === "0") zoomFit();
});

// ── Zoom helpers ───────────────────────────────────────────────
function zoomBy(f) {
  const cx = canvas.width / 2, cy = canvas.height / 2, old = zoom;
  zoom = Math.min(30, Math.max(0.02, zoom * f));
  panX = cx - (cx - panX) * (zoom / old);
  panY = cy - (cy - panY) * (zoom / old);
  render();
}
function zoomFit() {
  if (!img) return;
  const p = 30;
  zoom = Math.min((canvas.width - p * 2) / imgW, (canvas.height - p * 2) / imgH, 1);
  panX = (canvas.width - imgW * zoom) / 2;
  panY = (canvas.height - imgH * zoom) / 2;
  render();
}

// ── Annotations UI ─────────────────────────────────────────────
function updateList() {
  const list = document.getElementById("annList");
  document.getElementById("annCount").textContent = annotations.length;
  list.innerHTML = "";
  annotations.forEach((ann, i) => {
    const color = COLORS[i % COLORS.length];
    const item = document.createElement("div");
    item.className = "ann-item" + (i === selectedIdx ? " selected" : "");
    item.innerHTML = `
      <span class="dot" style="background:${color}"></span>
      <div class="info">
        <div class="name">${esc(ann.label)}</div>
        <div class="coords">${ann.x_min}, ${ann.y_min} → ${ann.x_max}, ${ann.y_max}</div>
      </div>
      <button class="del-btn" data-i="${i}">&#10005;</button>`;
    item.addEventListener("click", (e) => {
      if (e.target.classList.contains("del-btn")) return;
      selectedIdx = i; render(); updateList();
    });
    item.querySelector(".del-btn").addEventListener("click", () => {
      annotations.splice(i, 1);
      selectedIdx = selectedIdx === i ? -1 : selectedIdx > i ? selectedIdx - 1 : selectedIdx;
      unsaved = true; render(); updateList(); updateThumbs();
    });
    list.appendChild(item);
  });
}

function deleteSelected() {
  if (selectedIdx < 0 || selectedIdx >= annotations.length) return;
  annotations.splice(selectedIdx, 1); selectedIdx = -1; unsaved = true;
  render(); updateList(); updateThumbs();
}
function undoLast() {
  if (!annotations.length) return;
  annotations.pop(); selectedIdx = -1; unsaved = true;
  render(); updateList(); updateThumbs();
}
function clearAll() {
  if (!annotations.length) return;
  if (!confirm("Delete all annotations for this image?")) return;
  annotations.length = 0; selectedIdx = -1; unsaved = true;
  render(); updateList(); updateThumbs();
}

async function saveAnnotations() {
  if (!img || currentIdx < 0) return;
  annCache[images[currentIdx].id] = annotations;
  const res = await fetch("/api/save", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: images[currentIdx].id, annotations }),
  });
  const data = await res.json();
  if (data.ok) {
    unsaved = false;
    toast(`Saved ${annotations.length} annotations + ${data.crops} cropped images`, "success");
    render();
  } else { toast(data.error || "Save failed", "error"); }
}

// ── Status ─────────────────────────────────────────────────────
function updateStatus() {
  const bar = document.getElementById("statusBar");
  if (!img) { bar.innerHTML = '<span>Ready</span><span class="shortcut">Hold <kbd>Ctrl</kbd> to pan &nbsp; Scroll to zoom &nbsp; Right-click to delete box</span>'; return; }
  const name = images[currentIdx]?.name || "";
  const dot = unsaved ? '<span class="dot dot-unsaved"></span>Unsaved' : '<span class="dot dot-saved"></span>Saved';
  const parts = [
    `${name}`,
    `${annotations.length} annotation${annotations.length !== 1 ? "s" : ""}`,
    `${Math.round(zoom * 100)}%`,
    images.length > 1 ? `${currentIdx + 1} / ${images.length}` : "",
    dot,
  ].filter(Boolean);
  bar.innerHTML = parts.map(p => `<span>${p}</span>`).join("");
}

// ── Helpers ────────────────────────────────────────────────────
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
let toastTimer;
function toast(msg, type = "") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast show " + type;
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

resizeCanvas();
</script>
</body>
</html>
