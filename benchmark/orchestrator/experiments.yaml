defaults:
  epochs: 60         # z pilota yolov8n: f1 maksuje ~ep20, iou_median ~ep48; 60 + patience lapie cały zysk
  imgsz: 640
  batch: 64
  conf_thresh: 0.25
  # default LR z lr-find yolov8n (krzywa: pasmo 3e-4..1e-3, default ultralytics
  # 0.002 juz na zboczu rosnacym). Per-model override ponizej po lr-find.
  lr0: 0.0005
  train_flags: [--line-val, --diagnostics]

data:
  raw:
    yolo: dataset/yolo_raw/data.yaml
    images_root: ../../dataset
  prep:
    yolo: dataset/yolo_prep/data.yaml
    images_root: dataset/prep

# anotacje sa wspolne dla raw i prep (preprocessing zachowuje geometrie),
# wiec train/val coco sa globalne; per-wariant rozni sie tylko images_root
test_coco: dataset/annotations/instances_test.json
train_coco: dataset/annotations/instances_train.json
val_coco: dataset/annotations/instances_val.json

models:
  # lr0: dodac per-model po lr-find (yolov8n potwierdzony ~5e-4 = default;
  # yolo11n + rtdetr-l TODO, na razie biora defaults.lr0)
  yolov8:  {service: ultralytics, weights: yolov8n.pt,  finetune: true, zeroshot: false, lr0: 0.0005}
  yolo11:  {service: ultralytics, weights: yolo11n.pt,  finetune: true, zeroshot: false}
  rtdetr:  {service: ultralytics, weights: rtdetr-l.pt, finetune: true, zeroshot: false}
  # Faster R-CNN R50-FPN (detekcja, COCO-native -> data_format: coco). Diagnostyka/
  # line-val sa ultralytics-only, wiec train_flags puste; lr0 po lr-find.
  frcnn:
    service: detectron2
    weights: COCO-Detection/faster_rcnn_R_50_FPN_3x.yaml
    finetune: true
    zeroshot: false
    data_format: coco
    train_flags: []
  # Surya: natywna detekcja linii, predict-only (finetuning niedostepny) ->
  # zeroshot=true, finetune=false. Generuje tylko predict+eval (raw i prep).
  surya:
    service: surya
    weights: surya
    finetune: false
    zeroshot: true
  # dbnet / kraken — dolozymy z kolejnymi kontenerami
