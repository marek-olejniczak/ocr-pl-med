services:
  ultralytics:
    build: ./docker/ultralytics
    # Docker's default /dev/shm is 64MB; PyTorch DataLoader workers share
    # tensors through it and overflow → "No space left on device". 8GB is
    # plenty for batch 64 with 8 workers.
    shm_size: "8gb"
    volumes:
      - .:/benchmark
      # NOTE: symlinks under dataset/yolo_*/images point at host paths - they
      # must be visible in the container at the SAME path, e.g.:
      # - /home/user/datasets/lines:/home/user/datasets/lines:ro
      # or generate the layout with to_yolo --copy
    working_dir: /benchmark
    environment:
      - WANDB_API_KEY
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  detectron2:
    build: ./docker/detectron2
    shm_size: "8gb"
    volumes:
      - .:/benchmark
    working_dir: /benchmark
    environment:
      - WANDB_API_KEY
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  surya:
    build: ./docker/surya
    shm_size: "8gb"
    volumes:
      - .:/benchmark
    working_dir: /benchmark
    environment:
      - WANDB_API_KEY
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  kraken:
    build: ./docker/kraken
    shm_size: "8gb"
    volumes:
      - .:/benchmark
    working_dir: /benchmark
    environment:
      - WANDB_API_KEY
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
