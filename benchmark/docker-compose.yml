services:
  easyocr:
    build:
      context: .
      dockerfile: docker/easyocr/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./modele/cache/easyocr:/app/modele/cache/easyocr
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

