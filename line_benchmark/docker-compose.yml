# Containers run as the host user (HUID/HGID) so everything they write into the
# bind-mounted /benchmark (checkpoints, predictions, results) is owned by you,
# not root. Set HUID/HGID once in a local .env file (gitignored), e.g.:
#   printf 'HUID=%s\nHGID=%s\n' "$(id -u)" "$(id -g)" > .env
# HOME=/tmp because a non-root user cannot write /root; wandb/torch/ultralytics
# caches land in /tmp, model downloads go to /benchmark (writable by you).
services:
  ultralytics:
    build: ./docker/ultralytics
    user: "${HUID:-1000}:${HGID:-1000}"
    # Docker's default /dev/shm is 64MB; PyTorch DataLoader workers share
    # tensors through it and overflow → "No space left on device". 8GB is
    # plenty for batch 64 with 8 workers.
    shm_size: "8gb"
    volumes:
      - .:/benchmark
      # NOTE: symlinks under dataset/yolo_*/images point at host paths - they
      # must be visible in the container at the SAME path, e.g.:
      # - /home/user/datasets/lines:/home/user/datasets/lines:ro
      # or generate the layout with to_yolo --copy
    working_dir: /benchmark
    environment:
      - WANDB_API_KEY
      - HOME=/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  detectron2:
    build: ./docker/detectron2
    user: "${HUID:-1000}:${HGID:-1000}"
    shm_size: "8gb"
    volumes:
      - .:/benchmark
    working_dir: /benchmark
    environment:
      - WANDB_API_KEY
      - HOME=/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  surya:
    build: ./docker/surya
    user: "${HUID:-1000}:${HGID:-1000}"
    shm_size: "8gb"
    volumes:
      - .:/benchmark
    working_dir: /benchmark
    environment:
      - WANDB_API_KEY
      - HOME=/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  kraken:
    build: ./docker/kraken
    user: "${HUID:-1000}:${HGID:-1000}"
    shm_size: "8gb"
    volumes:
      - .:/benchmark
    working_dir: /benchmark
    environment:
      - WANDB_API_KEY
      - HOME=/tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
